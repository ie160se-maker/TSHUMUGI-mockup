<!DOCTYPE html>
<html lang="ja">
<head>

<title>TSUMUGI 広告 - 条件A（公益のみ）</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="condition-label">条件A</div>

      <path d="M 16 26 Q 9 26, 8 19 Q 8 13, 13 12 Q 16 11, 19 12 Q 24 13, 24 19 Q 23 26, 16 26 Z" fill="none"/>

      <path d="M 13 11 Q 11 9, 9 9 Q 11 11, 13 12" stroke-width="0.9"/>

      <path d="M 19 11 Q 21 9, 23 9 Q 21 11, 19 12" stroke-width="0.9"/>

  </svg>
</div>
    <div class="profile-info">
      <div class="profile-name">tsumugi_official</div>
      <div class="profile-meta">広告</div>
    </div>
    <div class="post-menu">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <circle cx="5" cy="12" r="1.5" fill="#262626"/>
        <circle cx="12" cy="12" r="1.5" fill="#262626"/>

    </div>

  <!-- CAROUSEL -->

      <div class="carousel-track">
        <div class="carousel-slide"><img src="TSUMUGI1.png" alt="MIRAINE Re:Table プロジェクト"></div>
        <div class="carousel-slide"><img src="TSUMUGI2.png" alt="年間 約522万トン"></div>
        <div class="carousel-slide"><img src="TSUMUGI3.png" alt="Re:Table の流れ"></div>
        <div class="carousel-slide"><img src="TSUMUGI4-a.png" alt="食卓と地域の未来のために"></div>
        <div class="carousel-slide"><img src="TSUMUGI5.png" alt="もったいないを、美味しいへ"></div>
      </div>
    </div>

    <button class="carousel-btn prev" aria-label="前へ">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
      </svg>
    </button>
    <button class="carousel-btn next" aria-label="次へ">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M8.59 16.59 10 18l6-6-6-6-1.41 1.41L13.17 12z"/>
      </svg>
    </button>
  </div>

  <!-- DOTS -->
  <div class="carousel-dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <!-- ACTION BAR -->
  <div class="action-bar">
    <div class="action-icon like">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M16.792 3.904A4.989 4.989 0 0 1 21.5 9.122c0 3.072-2.652 4.959-5.197 7.222-2.512 2.243-3.865 3.469-4.303 3.752-.477-.309-2.143-1.823-4.303-3.752C5.141 14.072 2.5 12.167 2.5 9.122a4.989 4.989 0 0 1 4.708-5.218 4.21 4.21 0 0 1 3.675 1.941c.84 1.175.98 1.763 1.12 1.763s.278-.588 1.11-1.766a4.17 4.17 0 0 1 3.679-1.938z"/>

    <div class="action-icon comment">

        <path d="M20.656 17.008a9.993 9.993 0 1 0-3.59 3.615L22 22Z" />

    </div>
    <div class="action-icon share">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <line x1="22" y1="3" x2="9.218" y2="10.083" />
        <polygon points="11.698 20.334 22 3.001 2 3.001 9.218 10.084 11.698 20.334" stroke-linejoin="round" />
      </svg>
    </div>
    <div class="action-icon bookmark">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <polygon points="20 21 12 13.44 4 21 4 3 20 3 20 21" stroke-linejoin="round" />
      </svg>
    </div>
  </div>

  <!-- POST CONTENT -->
  <div class="post-content">
    <div class="likes-count">15,376 likes</div>

    <div class="caption">
      <span class="username">tsumugi_official</span><span>✦ Re:Table プロジェクト、はじまります。

TSUMUGIから大切なお知らせです。私たちは食品ロス問題に向き合うため、『Re:Table プロジェクト』をスタートします。規格外で廃棄されてきた野菜を回収し、毎日のお料理として生まれ変わらせます。

食卓と地域の未来のために、私たちにできることを。

</span><span class="hashtags">#ReTableプロジェクト #TSUMUGI #食品ロス削減 #規格外野菜</span>
    </div>

    <div class="comments-link">コメント12件をすべて表示</div>
    <div class="timestamp">3時間前</div>
  </div>

  <!-- COMMENT INPUT BAR -->
  <div class="comment-input-bar">
    <span class="emoji-icon">☺</span>
    <span class="placeholder">コメントを追加...</span>
  </div>

</div>

<script src="carousel.js"></script>
